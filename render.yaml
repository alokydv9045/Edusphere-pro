services:
  # ── EduSphere Backend API ──────────────────────────────────────────────────
  - type: web
    name: edusphere-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    rootDir: server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      # Supabase Credentials (Keep existing from your provided list)
      - key: DATABASE_URL
        value: "postgresql://postgres.ypcdplcbjntaxisujtwj:Mysupabase9045@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?pgbouncer=true"
      - key: DIRECT_URL
        value: "postgresql://postgres.ypcdplcbjntaxisujtwj:Mysupabase9045@aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres"
      # Security Secrets
      - key: JWT_SECRET
        value: "edusphere-secure-jwt-secret-99af827c1-3a0e-4f1b-8d2c-7b4a9e5d1c3f"
      - key: COOKIE_SECRET
        value: "edusphere-secure-cookie-secret-99af827c1"
      # CORS: Set to "*" initially, update to your frontend .onrender.com URL later
      - key: ALLOWED_ORIGINS
        value: "*"
      # School Identity
      - key: SCHOOL_ID
        value: edusphere-prod
      - key: SCHOOL_NAME
        value: EduSphere ERP
      # Razorpay & Cloudinary (Placeholders - populate from your list)
      - key: CLOUDINARY_CLOUD_NAME
        value: dls1wm7vn
      - key: CLOUDINARY_API_KEY
        value: 836367281817127
      - key: CLOUDINARY_API_SECRET
        value: 3AgyOA9Dcvcefk8eF7C0pJ5Wm90
      - key: RAZORPAY_KEY_ID
        value: rzp_test_SSN8q9JDwXAvdt
      - key: RAZORPAY_KEY_SECRET
        value: WKueOf2DOH8IeZ9AmoG2N5S5

  # ── EduSphere Frontend Client ──────────────────────────────────────────────
  - type: web
    name: edusphere-client
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    rootDir: client
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_OPTIONS
        value: "--max-old-space-size=450"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: edusphere-api
          property: url
          suffix: /api
      - key: PORT
        value: 3000
